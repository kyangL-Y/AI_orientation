<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="renderer" content="webkit">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="icon" href="/admin/favicon.ico">
  <title>华智管理系统</title>
  <!--[if lt IE 11]><script>window.location.href='/html/ie.html';</script><![endif]-->
  <style>
    html,
    body,
    #app {
      height: 100%;
      margin: 0px;
      padding: 0px;
    }

    .chromeframe {
      margin: 0.2em 0;
      background: #ccc;
      color: #000;
      padding: 0.2em 0;
    }

    #loader-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 999999;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Logo 区域 */
    .loader-logo {
      margin-bottom: 40px;
      text-align: center;
    }

    .loader-logo h1 {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      margin: 0;
      letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(64, 169, 255, 0.5);
    }

    .loader-logo p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 8px;
      letter-spacing: 2px;
    }

    /* 脉冲圆环动画 */
    .pulse-loader {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .pulse-loader .circle {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #40a9ff;
      animation: pulse-spin 2.5s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }

    .pulse-loader .circle:nth-child(1) {
      animation-delay: -0.9s;
      border-top-color: #40a9ff;
    }

    .pulse-loader .circle:nth-child(2) {
      width: 70%;
      height: 70%;
      top: 15%;
      left: 15%;
      animation-delay: -0.6s;
      border-top-color: #69c0ff;
    }

    .pulse-loader .circle:nth-child(3) {
      width: 40%;
      height: 40%;
      top: 30%;
      left: 30%;
      animation-delay: -0.3s;
      border-top-color: #91d5ff;
    }

    /* 中心点 */
    .pulse-loader .center-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, #40a9ff, #1890ff);
      border-radius: 50%;
      animation: pulse-glow 2.5s ease-in-out infinite;
    }

    @keyframes pulse-spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse-glow {
      0%, 100% {
        box-shadow: 0 0 10px rgba(64, 169, 255, 0.5);
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        box-shadow: 0 0 25px rgba(64, 169, 255, 0.8);
        transform: translate(-50%, -50%) scale(1.15);
      }
    }

    /* 加载文字 */
    .load_title {
      margin-top: 40px;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: rgba(255, 255, 255, 0.85);
      font-size: 16px;
      letter-spacing: 2px;
    }

    /* 进度点动画 */
    .loading-dots {
      display: inline-flex;
      margin-left: 8px;
    }

    .loading-dots span {
      width: 6px;
      height: 6px;
      margin: 0 3px;
      background: #40a9ff;
      border-radius: 50%;
      animation: dots-bounce 2s ease-in-out infinite both;
    }

    .loading-dots span:nth-child(1) { animation-delay: -0.5s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.25s; }
    .loading-dots span:nth-child(3) { animation-delay: 0s; }

    @keyframes dots-bounce {
      0%, 80%, 100% {
        transform: scale(0.6);
        opacity: 0.5;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* 加载完成过渡 */
    .loaded #loader-wrapper {
      opacity: 0;
      visibility: hidden;
      transition: all 0.5s ease-out;
    }

    .no-js #loader-wrapper {
      display: none;
    }
  </style>
  <script type="module" crossorigin src="/admin/static/js/index-KjQIQL6T.js"></script>
  <link rel="stylesheet" crossorigin href="/admin/static/css/index-DRiA_KqE.css">
</head>

<body>
  <div id="app">
    <div id="loader-wrapper">
      <div class="loader-logo">
        <h1>华智培训</h1>
        <p>Hotel Training System</p>
      </div>
      <div class="pulse-loader">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="center-dot"></div>
      </div>
      <div class="load_title">
        正在加载
        <div class="loading-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
